name: Auto Post News
on:
  workflow_dispatch:
jobs:
  run-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Run Auto Post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 -c "
          import urllib.request, json, os;
          key = os.environ['GEMINI_API_KEY'];
          url = f'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key={key}';
          data = {'contents': [{'parts': [{'text': '請寫一段 <div>測試內容</div> 的 HTML 代碼'}]}]};
          req = urllib.request.Request(url, data=json.dumps(data).encode('utf-8'), headers={'Content-Type': 'application/json'});
          with urllib.request.urlopen(req) as res: 
              content = json.loads(res.read().decode('utf-8'))['candidates'][0]['content']['parts'][0]['text']
              with open('index.html', 'a', encoding='utf-8') as f: f.write('\n' + content + '\n')
          "
      - name: Commit changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add index.html
          git commit -m 'Update' || echo 'No change'
          git push
